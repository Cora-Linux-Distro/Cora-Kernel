name: Build CoraOS Kernels

on:
  workflow_dispatch:

concurrency:
  group: coraos-repo-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: "Build: ${{ matrix.kernel_type }}"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: archlinux:latest
      options: --security-opt seccomp=unconfined
    env:
      CCACHE_DIR: /ccache
      CCACHE_MAXSIZE: 5G
      CCACHE_COMPRESS: 1
      CCACHE_DEPEND: 1

    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel_type: generic
            cpu_target: GENERIC
            package_name: linux-coraos-default
          - kernel_type: x86-64-v2
            cpu_target: GENERIC_V2
            package_name: linux-coraos-default-x86-64-v2
          - kernel_type: x86-64-v3
            cpu_target: GENERIC_V3
            package_name: linux-coraos-default-x86-64-v3
          - kernel_type: x86-64-v4
            cpu_target: GENERIC_V4
            package_name: linux-coraos-default-x86-64-v4

    steps:
      - uses: actions/checkout@v4

      - name: free disk space
        run: |
          rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                 /usr/local/lib/android /usr/lib/gcc/x86_64-linux-gnu \
                 /usr/share/doc /usr/share/man 2>/dev/null || true
          df -h /

      - name: restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /ccache
          key: ccache-${{ matrix.kernel_type }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.kernel_type }}-

      - name: restore pacman cache
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ hashFiles('.github/workflows/coraosbuild.yaml') }}
          restore-keys: pacman-

      - name: install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            base-devel git bc kmod libelf pahole cpio perl tar xz zstd \
            python clang llvm lld fakeroot sudo pacman-contrib gnupg \
            archlinux-keyring libarchive ccache
          ccache -z

      - name: setup keyring
        run: |
          rm -rf /etc/pacman.d/gnupg
          pacman-key --init
          pacman-key --populate archlinux

      - name: add builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder

      - name: configure makepkg
        run: |
          sed -i 's|^BUILDENV=.*|BUILDENV=(!distcc color ccache check sign)|' /etc/makepkg.conf
          mkdir -p /ccache /home/builder/.ccache
          echo "cache_dir = /ccache" > /home/builder/.ccache/ccache.conf
          chown -R builder:builder /ccache /home/builder/.ccache

      - name: fetch cachyos kernel
        run: |
          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git upstream
          cp -r upstream/linux-cachyos/* .
          rm -rf upstream

      - name: patch PKGBUILD
        run: |
          sed -i "s/^pkgbase=.*/pkgbase=${{ matrix.package_name }}/" PKGBUILD
          sed -i 's/^pkgdesc=.*/pkgdesc=CoraOS kernel - EEVDF with CachyOS patches/' PKGBUILD
          chown -R builder:builder .

      - name: import gpg key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        shell: su builder -s /bin/bash {0}
        run: |
          export GNUPGHOME="$HOME/.gnupg"
          mkdir -p "$GNUPGHOME" && chmod 700 "$GNUPGHOME"

          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          echo -e "batch\nyes\npinentry-mode loopback" > "$GNUPGHOME/gpg.conf"

          gpgconf --kill gpg-agent || true

          echo "$GPG_KEY" | gpg --batch --import

          FINGERPRINT=$(gpg --list-secret-keys --keyid-format LONG | grep -m1 'sec' | awk '{print $2}' | cut -d'/' -f2)

          if [ -z "$FINGERPRINT" ]; then
            echo "::error::GPG key import failed or no secret key found"
            exit 1
          fi

          echo "::notice::Builder key fingerprint: $FINGERPRINT"

          echo -e "5\ny\n" | gpg --command-fd 0 --expert --edit-key "$FINGERPRINT" trust quit

          sudo sed -i -E 's/^#?[[:space:]]*GPGKEY=.*/GPGKEY="'"$FINGERPRINT"'"/' /etc/makepkg.conf

          if ! grep -q "^GPGKEY=" /etc/makepkg.conf; then
            echo "GPGKEY=\"$FINGERPRINT\"" | sudo tee -a /etc/makepkg.conf
          fi

      - name: build kernel
        shell: su builder -s /bin/bash {0}
        run: |
          export _cachy_config="yes"
          export _cpusched="cachyos"
          export _cc_harder="yes"
          export _tcp_bbr3="yes"
          export _use_kcfi="yes"
          export _use_llvm_lto="thin"
          export _hugepage="madvise"
          export _processor_opt="${{ matrix.cpu_target }}"

          for attempt in 1 2 3; do
            echo "::group::Build attempt $attempt/3"
            if MAKEFLAGS="-j$(nproc)" makepkg -s --noconfirm --skipchecksums --sign --skippgpcheck; then
              echo "::endgroup::"
              echo "::notice::Build succeeded on attempt $attempt"
              break
            fi
            echo "::endgroup::"
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Build failed after 3 attempts"
              exit 1
            fi
            echo "Build failed, retrying in 15s..."
            sleep 15
          done

      - name: verify package artifacts
        shell: su builder -s /bin/bash {0}
        run: |
          expected_pkgbase="${{ matrix.package_name }}"
          found=0
          shopt -s nullglob
          for f in *.pkg.tar.zst; do
            pkgbase=$(bsdtar -xOf "$f" .PKGINFO | grep -m1 '^pkgbase = ' | cut -d' ' -f3-)
            if [ "$pkgbase" = "$expected_pkgbase" ]; then
              found=1
              echo "Built: $f"
              if [ ! -f "${f}.sig" ]; then
                echo "::error::Signature file missing for package: $f"
                exit 1
              fi
              gpg --verify "${f}.sig" "$f" 2>&1 | grep -q "Good signature" || {
                echo "::error::Signature verification FAILED for $f"
                exit 1
              }
              echo "  ✓ signature verified"
            fi
          done
          if [ "$found" -ne 1 ]; then
            echo "::error::Expected package base '$expected_pkgbase' not found"
            exit 1
          fi

      - name: ccache stats
        if: always()
        run: |
          echo "::group::ccache statistics"
          ccache -s || true
          echo "::endgroup::"

      - name: save ccache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: /ccache
          key: ccache-${{ matrix.kernel_type }}-${{ github.sha }}

      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel_type }}
          path: "*.pkg.tar.zst*"
          if-no-files-found: error
          retention-days: 3

  repository:
    name: publish repo
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: archlinux:latest
      options: --security-opt seccomp=unconfined

    steps:
      - name: install tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            pacman-contrib rclone libarchive gnupg jq curl sudo

      - name: add builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: import gpg key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        shell: su builder -s /bin/bash {0}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo -e "allow-loopback-pinentry\nbatch" > ~/.gnupg/gpg-agent.conf
          echo "auto-key-retrieve" >> ~/.gnupg/gpg.conf
          echo "keyserver hkps://keyserver.ubuntu.com" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true

          echo "$GPG_KEY" | gpg --batch --import
          FINGERPRINT=$(gpg --list-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
          if [ -z "$FINGERPRINT" ]; then
            echo "::error::GPG key import failed"
            exit 1
          fi
          echo "::notice::Builder key fingerprint: $FINGERPRINT"
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust

      - name: sync current repo from R2 to staging
        env:
          REPO_KEY: ${{ secrets.REPO_ACCESS_KEY }}
          REPO_SECRET: ${{ secrets.REPO_SECRET_ACCESS_KEY }}
          ACCOUNT: ${{ secrets.ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          rclone config create coraosrepo s3 \
            provider=Cloudflare \
            access_key_id="$REPO_KEY" \
            secret_access_key="$REPO_SECRET" \
            endpoint="https://$ACCOUNT.r2.cloudflarestorage.com" \
            no_check_bucket=true

          mkdir -p CoraOS_Repo.staging
          rclone copy coraosrepo:coraos-repo/x86_64/ CoraOS_Repo.staging/ \
            --verbose --retries 5 --retries-sleep 10s \
            --transfers 16 --checkers 8

          echo "::group::Staging directory contents (from R2)"
          ls -la CoraOS_Repo.staging/
          echo "::endgroup::"

      - name: stage new packages and prune old versions
        shell: bash
        run: |
          set -euo pipefail

          cp artifacts/*.pkg.tar.zst* CoraOS_Repo.staging/ || {
            echo "::error::No package artifacts to publish"
            exit 1
          }

          cd CoraOS_Repo.staging

          shopt -s nullglob
          for sig in *.pkg.tar.zst.sig; do
            if [ ! -f "${sig%.sig}" ]; then
              echo "Orphan sig: $sig"
              rm -f "$sig"
            fi
          done

          echo "::group::paccache prune (keep newest 3)"
          paccache -r -k 3 -c . -v || {
            echo "::warning::paccache exited non-zero, but continuing"
          }
          echo "::endgroup::"

          echo "::group::Staging contents after prune"
          ls -la
          echo "::endgroup::"

      - name: rebuild repo database in staging
        run: |
          set -euo pipefail
          cd CoraOS_Repo.staging

          rm -f coraos.db.tar.gz.old coraos.files.tar.gz.old
          rm -f coraos.db.tar.gz coraos.db coraos.files.tar.gz coraos.files
          rm -f coraos.db.tar.gz.sig coraos.files.tar.gz.sig
          rm -f coraos.db.sig coraos.files.sig

          shopt -s nullglob
          repo-add coraos.db.tar.gz *.pkg.tar.zst

          ln -sf coraos.db.tar.gz    coraos.db
          ln -sf coraos.files.tar.gz coraos.files

          echo "::group::Staging DB built"
          ls -la coraos.db* coraos.files*
          echo "::endgroup::"

      - name: chown staging to builder
        run: chown -R builder:builder CoraOS_Repo.staging

      - name: sign the repo databases in staging
        shell: su builder -s /bin/bash {0}
        run: |
          set -euo pipefail
          cd CoraOS_Repo.staging

          for dbfile in coraos.db.tar.gz coraos.files.tar.gz; do
            if [ -f "$dbfile" ]; then
              echo "Signing $dbfile..."
              gpg --detach-sign --yes --no-tty \
                  --pinentry-mode loopback --batch \
                  "$dbfile"
              gpg --verify "${dbfile}.sig" "$dbfile" 2>&1 | grep -q "Good signature" || {
                echo "::error::Signature verification failed for $dbfile"
                exit 1
              }
              echo "  ✓ ${dbfile}.sig created and verified"
            fi
          done

          ln -sf coraos.db.tar.gz.sig    coraos.db.sig
          ln -sf coraos.files.tar.gz.sig coraos.files.sig

          echo "::group::Staging DB signed"
          ls -la coraos.db* coraos.files*
          echo "::endgroup::"

      - name: pre-swap verification
        shell: su builder -s /bin/bash {0}
        run: |
          set -euo pipefail
          cd CoraOS_Repo.staging

          echo "::group::Verifying new DB integrity"
          if ! bsdtar -tzf coraos.db.tar.gz > /dev/null 2>&1; then
            echo "::error::coraos.db.tar.gz is not a valid gzip tarball"
            exit 1
          fi
          echo "  ✓ coraos.db.tar.gz is valid"

          if ! bsdtar -tzf coraos.files.tar.gz > /dev/null 2>&1; then
            echo "::error::coraos.files.tar.gz is not a valid gzip tarball"
            exit 1
          fi
          echo "  ✓ coraos.files.tar.gz is valid"

          for sig in coraos.db.tar.gz.sig coraos.files.tar.gz.sig; do
            target="${sig%.sig}"
            if ! gpg --verify "$sig" "$target" 2>&1 | grep -q "Good signature"; then
              echo "::error::$sig does not verify against $target"
              exit 1
            fi
            echo "  ✓ $sig verifies"
          done

          shopt -s nullglob
          for f in *.pkg.tar.zst; do
            if [ -f "${f}.sig" ]; then
              if ! gpg --verify "${f}.sig" "$f" 2>&1 | grep -q "Good signature"; then
                echo "::error::${f}.sig does not verify"
                exit 1
              fi
            fi
          done
          echo "  ✓ All package signatures verify"

          echo "::endgroup::"
          echo "::notice::Pre-swap verification passed"

      - name: atomic swap staging to live
        shell: bash
        run: |
          set -euo pipefail

          rm -rf CoraOS_Repo.bak

          if [ -d CoraOS_Repo ]; then
            mv CoraOS_Repo CoraOS_Repo.bak
          fi
          mv CoraOS_Repo.staging CoraOS_Repo

          rm -rf CoraOS_Repo.bak

          echo "::group::Live repo after swap"
          ls -la CoraOS_Repo/
          echo "::endgroup::"
          echo "::notice::Atomic swap complete"

      - name: sync live repo to R2
        env:
          REPO_KEY: ${{ secrets.REPO_ACCESS_KEY }}
          REPO_SECRET: ${{ secrets.REPO_SECRET_ACCESS_KEY }}
          ACCOUNT: ${{ secrets.ACCOUNT_ID }}
        run: |
          set -euo pipefail

          rclone sync CoraOS_Repo/ coraosrepo:coraos-repo/x86_64/ \
            --verbose --retries 5 --retries-sleep 10s \
            --checksum --copy-links \
            --transfers 16 --checkers 8 \
            --low-level-retries 20

          echo "::notice::R2 sync complete"

      - name: chown workspace to builder
        run: chown -R builder:builder .

      - name: configure rclone as builder
        env:
          REPO_KEY: ${{ secrets.REPO_ACCESS_KEY }}
          REPO_SECRET: ${{ secrets.REPO_SECRET_ACCESS_KEY }}
          ACCOUNT: ${{ secrets.ACCOUNT_ID }}
        shell: su builder -s /bin/bash {0}
        run: |
          mkdir -p ~/.config/rclone
          rclone config create coraosrepo s3 \
            provider=Cloudflare \
            access_key_id="$REPO_KEY" \
            secret_access_key="$REPO_SECRET" \
            endpoint="https://$ACCOUNT.r2.cloudflarestorage.com" \
            no_check_bucket=true

      - name: verify R2 sync
        shell: su builder -s /bin/bash {0}
        run: |
          set -euo pipefail

          mkdir -p r2_verify
          cd r2_verify

          echo "::group::Downloading DB and sig from R2 for verification"
          rclone copy coraosrepo:coraos-repo/x86_64/coraos.db.tar.gz ./
          rclone copy coraosrepo:coraos-repo/x86_64/coraos.db.tar.gz.sig ./
          rclone copy coraosrepo:coraos-repo/x86_64/coraos.files.tar.gz ./
          rclone copy coraosrepo:coraos-repo/x86_64/coraos.files.tar.gz.sig ./
          echo "::endgroup::"

          echo "::group::File hashes (local vs R2)"
          for f in coraos.db.tar.gz coraos.db.tar.gz.sig coraos.files.tar.gz coraos.files.tar.gz.sig; do
            LOCAL_HASH=$(sha256sum "../CoraOS_Repo/$f" 2>/dev/null | awk '{print $1}' || echo "missing")
            R2_HASH=$(sha256sum "./$f" 2>/dev/null | awk '{print $1}' || echo "missing")
            echo "$f:"
            echo "  local: $LOCAL_HASH"
            echo "  r2:    $R2_HASH"
            if [ "$LOCAL_HASH" != "$R2_HASH" ]; then
              echo "::error::$f on R2 does not match local copy"
              exit 1
            fi
          done
          echo "::endgroup::"

          echo "::group::Verifying R2 signatures"
          for dbfile in coraos.db.tar.gz coraos.files.tar.gz; do
            if ! gpg --verify "${dbfile}.sig" "$dbfile" 2>&1 | grep -q "Good signature"; then
              echo "::error::R2 signature for $dbfile does not verify"
              exit 1
            fi
            echo "  ✓ R2 $dbfile.sig verifies"
          done
          echo "::endgroup::"

          echo "::notice::R2 sync verified"

      - name: purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          REPO_HOSTNAME: ${{ secrets.REPO_HOSTNAME }}
        shell: bash
        run: |
          set -uo pipefail

          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::notice::Skipping cache purge - CF secrets not provided"
            exit 0
          fi

          HOST="${REPO_HOSTNAME:-repo.coraos.org}"
          PURGED=0
          FAILED=0

          for path in coraos.db coraos.db.tar.gz coraos.files coraos.files.tar.gz \
                      coraos.db.sig coraos.db.tar.gz.sig \
                      coraos.files.sig coraos.files.tar.gz.sig; do
            url="https://${HOST}/x86_64/${path}"
            echo "Purging: $url"
            response=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"files\":[\"${url}\"]}")

            if echo "$response" | jq -e '.success == true' > /dev/null 2>&1; then
              echo "  ✓ purged"
              PURGED=$((PURGED+1))
            else
              echo "  ✗ failed"
              FAILED=$((FAILED+1))
            fi
          done

          echo "::notice::Purged $PURGED URLs ($FAILED failed)"

      - name: publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Kernel publish result"
            echo ""
            echo "### Status"
            if [ "${{ job.status }}" = "success" ]; then
              echo "✅ Published to \`coraosrepo:coraos-repo/x86_64/\`"
              echo "✅ R2 sync verified (DB sigs match)"
            else
              echo "❌ Job did not complete successfully"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: cleanup on failure
        if: failure()
        shell: bash
        run: |
          rm -rf CoraOS_Repo.staging r2_verify
          echo "::notice::Cleaned up after failure"

  release:
    name: create release
    needs: [build, repository]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: prep assets
        id: assets
        run: |
          mkdir -p release
          cp artifacts/*.pkg.tar.zst* release/
          (cd release && sha256sum *.pkg.tar.zst > checksums.txt)
          echo "stamp=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: make the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: coraos-${{ github.run_number }}-${{ steps.assets.outputs.stamp }}
          name: CoraOS Kernel Build v${{ github.run_number }}
          files: release/*
          body: |
            ## CoraOS Kernel Build v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
