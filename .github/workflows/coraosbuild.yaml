name: Build CoraOS Kernels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest
      options: --security-opt seccomp=unconfined

    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel_type: generic
            cpu_target: GENERIC
            package_name: linux-coraos
          - kernel_type: x86-64-v2
            cpu_target: GENERIC_V2
            package_name: linux-coraos-x86-64-v2
          - kernel_type: x86-64-v3
            cpu_target: GENERIC_V3
            package_name: linux-coraos-x86-64-v3
          - kernel_type: x86-64-v4
            cpu_target: GENERIC_V4
            package_name: linux-coraos-x86-64-v4

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: free up storage
        run: |
          rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/lib/gcc/x86_64-linux-gnu/9 /usr/local/lib/android 2>/dev/null
          df -h

      - name: install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git bc kmod libelf pahole cpio perl tar xz zstd python \
            clang llvm lld fakeroot sudo pacman-contrib gnupg archlinux-keyring rclone

      - name: init keys
        run: |
          rm -rf /etc/pacman.d/gnupg
          pacman-key --init
          pacman-key --populate archlinux

      - name: create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      - name: pull latest CachyOS kernel source
        run: |
          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git upstream
          cp -r upstream/linux-cachyos/* .
          rm -rf upstream

      - name: setting Name,Version and Description
        run: |
          sed -i "s/^pkgbase=.*/pkgbase=${{ matrix.package_name }}/" PKGBUILD
          sed -i 's/^pkgdesc=.*/pkgdesc=CoraOS kernel. Applied patches to the CachyOS kernel/' PKGBUILD

      - name: set perms
        run: |
          chown -R builder:builder .

      - name: import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | su builder -c "gpg --batch --import"

      - name: build kernel & apply Tweaks
        run: |
          su builder -c '
            # Optimizations
            export _cachy_config="yes"
            export _cpusched="bore"
            export _cc_harder="yes"
            export _tcp_bbr3="yes"
            export _use_kcfi="yes"
            export _use_llvm_lto="thin"
            export _hugepage="madvise"
            export _processor_opt="${{ matrix.cpu_target }}"

            MAKEFLAGS="-j$(nproc)" makepkg -s --noconfirm --skippgpcheck --skipchecksums --sign
          '

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel_type }}
          path: "*.pkg.tar.zst*"
          if-no-files-found: error

      - name: upload to repo
        env:
          REPO_KEY: ${{ secrets.REPO_ACCESS_KEY }}
          REPO_SECRET: ${{ secrets.REPO_SECRET_ACCESS_KEY }}
          ACCOUNT: ${{ secrets.ACCOUNT_ID }}
        run: |
          rclone config create coraosrepo s3 provider=Cloudflare access_key_id=$REPO_KEY secret_access_key=$REPO_SECRET endpoint=https://$ACCOUNT.r2.cloudflarestorage.com no_check_bucket=true

          mkdir -p CoraOS_Repo
          cp *.pkg.tar.zst* CoraOS_Repo/

          rclone copy CoraOS_Repo/ coraosrepo:coraos-repo/x86_64/ --no-check-dest

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: get build timestamp
        id: build_time
        run: echo "stamp=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: create release folder
        run: |
          mkdir -p release
          cp artifacts/*.pkg.tar.zst* release/ 2>/dev/null || true
          cd release
          sha256sum *.pkg.tar.zst* > checksums.txt 2>/dev/null || true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: coraos-${{ github.run_number }}-${{ steps.build_time.outputs.stamp }}
          name: CoraOS Kernel Build v${{ github.run_number }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
